<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xem bài trắc nghiệm</title>

  <!-- Apply theme trước khi render để tránh flicker -->
  <script>
    (function(){
      var t = localStorage.getItem('quiz-app-theme') || 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>

  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/animation.css" />

  <style>
    .view-wrapper {
      max-width: 820px;
      margin: 0 auto;
      padding: var(--space-xl) var(--space-md);
    }

    /* ---- Quiz meta header ---- */
    .quiz-meta-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-xl);
      overflow: hidden;
      margin-bottom: var(--space-xl);
      box-shadow: var(--card-shadow);
    }
    .quiz-meta-banner {
      height: 6px;
      background: var(--gradient-primary);
    }
    .quiz-meta-body {
      padding: var(--space-xl);
    }
    .quiz-meta-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.4rem;
      line-height: 1.3;
    }
    .quiz-meta-desc {
      color: var(--text-secondary);
      font-size: 0.95rem;
      margin-bottom: var(--space-md);
      line-height: 1.6;
    }
    .quiz-meta-row {
      display: flex;
      gap: var(--space-sm);
      flex-wrap: wrap;
      align-items: center;
    }
    .quiz-meta-actions {
      display: flex;
      gap: var(--space-sm);
      flex-wrap: wrap;
      margin-top: var(--space-lg);
      padding-top: var(--space-md);
      border-top: 1px solid var(--border);
    }

    /* ---- Questions list ---- */
    .questions-section-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-secondary);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-size: 0.8rem;
      margin-bottom: var(--space-md);
    }

    .view-question-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-lg);
      margin-bottom: var(--space-md);
      overflow: hidden;
      transition: box-shadow var(--transition);
    }
    .view-question-card:hover {
      box-shadow: var(--shadow-md);
    }

    .vq-header {
      display: flex;
      align-items: flex-start;
      gap: var(--space-md);
      padding: var(--space-lg);
      padding-bottom: var(--space-sm);
    }
    .vq-num {
      flex-shrink: 0;
      width: 30px;
      height: 30px;
      background: var(--gradient-primary);
      color: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.82rem;
      margin-top: 2px;
    }
    .vq-text {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.55;
      flex: 1;
      margin: 0;
    }

    .vq-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
      padding: var(--space-sm) var(--space-lg) var(--space-lg);
      padding-left: calc(var(--space-lg) + 30px + var(--space-md));
    }
    @media (max-width: 560px) {
      .vq-options { grid-template-columns: 1fr; }
    }

    .vq-option {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.55rem 0.85rem;
      border-radius: var(--radius-sm);
      font-size: 0.88rem;
      line-height: 1.4;
      border: 1.5px solid var(--border);
      background: var(--bg-surface-2);
      color: var(--text-secondary);
    }
    .vq-option.is-correct {
      border-color: var(--success);
      background: rgba(16, 185, 129, 0.08);
      color: var(--success);
      font-weight: 600;
    }
    .vq-option-letter {
      flex-shrink: 0;
      font-weight: 700;
      font-size: 0.8rem;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-surface);
      border: 1.5px solid var(--border);
      color: var(--text-muted);
    }
    .vq-option.is-correct .vq-option-letter {
      background: var(--success);
      border-color: var(--success);
      color: #fff;
    }
    .vq-option-text { flex: 1; }

    /* Error / Loading states */
    .state-box {
      text-align: center;
      padding: 5rem var(--space-xl);
      color: var(--text-muted);
    }
    .state-box .icon { font-size: 3.5rem; margin-bottom: 1rem; }
    .state-box h3 { color: var(--text-secondary); margin-bottom: 0.5rem; }
  </style>
</head>
<body>

<!-- HEADER -->
<header class="app-header">
  <div class="container">
    <div class="header-inner">
      <a href="index.html" class="header-logo">
        <span>🎓</span> Quiz AI Creator
      </a>
      <nav class="header-nav">
        <button class="btn btn-secondary btn-sm" onclick="window.location.href='quiz-list.html'">← Danh sách</button>
        <button class="btn btn-secondary btn-sm" onclick="window.location.href='index.html'">➕ Tạo mới</button>
        <button id="theme-toggle" title="Chuyển theme">🌙</button>
      </nav>
    </div>
  </div>
</header>

<div id="notification-container"></div>

<div class="view-wrapper">
  <div id="view-content">
    <!-- Rendered by JS -->
    <div class="state-box">
      <div class="icon">⏳</div>
      <h3>Đang tải...</h3>
    </div>
  </div>
</div>

<!-- Scripts: load service trước, sau đó page logic -->
<script src="js/services/exportService.js"></script>
<script src="js/theme.js"></script>
<script src="js/ui.js"></script>

<script>
(function () {
  'use strict';

  const LETTERS = ['A', 'B', 'C', 'D'];

  // --- 1. Lấy quiz ID từ URL ---
  function getQuizId() {
    const params = new URLSearchParams(window.location.search);
    return params.get('id') || null;
  }

  // --- 2. Load quiz từ localStorage ---
  function loadQuiz(id) {
    try {
      const quizzes = JSON.parse(localStorage.getItem('quizzes') || '[]');
      return quizzes.find(function(q) { return q.id === id; }) || null;
    } catch (e) {
      console.error('Lỗi đọc localStorage:', e);
      return null;
    }
  }

  // --- 3. Escape HTML ---
  function esc(str) {
    return String(str || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // --- 4. Lấy index đáp án đúng ---
  function getCorrectIndex(q) {
    if (typeof q.correctAnswer === 'number') return q.correctAnswer;
    if (typeof q.correct_answer === 'number') return q.correct_answer;
    if (typeof q.correctAnswer === 'string') {
      var idx = LETTERS.indexOf(q.correctAnswer.toUpperCase());
      return idx >= 0 ? idx : 0;
    }
    return 0;
  }

  // --- 5. Lấy mảng options ---
  function getOptions(q) {
    if (Array.isArray(q.options) && q.options.length) return q.options;
    return [q.a, q.b, q.c, q.d].filter(function(v) {
      return v !== undefined && v !== null && v !== '';
    });
  }

  // --- 6. Render trang ---
  function render(quiz) {
    var container = document.getElementById('view-content');
    if (!container) return;

    // Cập nhật title tab
    document.title = esc(quiz.title) + ' — Quiz AI Creator';

    var questionsHtml = (quiz.questions || []).map(function(q, i) {
      var opts = getOptions(q);
      var correctIdx = getCorrectIndex(q);

      var optionsHtml = opts.map(function(opt, oi) {
        var isCorrect = oi === correctIdx;
        return '<div class="vq-option ' + (isCorrect ? 'is-correct' : '') + '">' +
          '<span class="vq-option-letter">' + (LETTERS[oi] || String.fromCharCode(65 + oi)) + '</span>' +
          '<span class="vq-option-text">' + esc(opt) + '</span>' +
          '</div>';
      }).join('');

      return '<div class="view-question-card animate-slide-up" style="animation-delay:' + (i * 0.04) + 's">' +
        '<div class="vq-header">' +
          '<div class="vq-num">' + (i + 1) + '</div>' +
          '<p class="vq-text">' + esc(q.question || q.text || '') + '</p>' +
        '</div>' +
        '<div class="vq-options">' + optionsHtml + '</div>' +
        '</div>';
    }).join('');

    var createdAt = quiz.createdAt
      ? new Date(quiz.createdAt).toLocaleDateString('vi-VN', {day:'2-digit', month:'2-digit', year:'numeric'})
      : '—';

    container.innerHTML =
      '<div class="quiz-meta-card animate-scale-in">' +
        '<div class="quiz-meta-banner"></div>' +
        '<div class="quiz-meta-body">' +
          '<div class="quiz-meta-title">' + esc(quiz.title || 'Không có tiêu đề') + '</div>' +
          (quiz.description ? '<div class="quiz-meta-desc">' + esc(quiz.description) + '</div>' : '') +
          '<div class="quiz-meta-row">' +
            '<span class="badge badge-primary">📝 ' + (quiz.questions || []).length + ' câu hỏi</span>' +
            '<span class="badge" style="background:var(--bg-surface-2);color:var(--text-muted);">📅 ' + createdAt + '</span>' +
          '</div>' +
          '<div class="quiz-meta-actions">' +
            '<button class="btn btn-primary" onclick="doTakeQuiz()">🎯 Làm bài ngay</button>' +
            '<button class="btn btn-secondary" onclick="window.location.href=\'quiz-list.html\'">← Về danh sách</button>' +
          '</div>' +
          '<div id="view-export-buttons" style="margin-top:var(--space-md);"></div>' +
        '</div>' +
      '</div>' +

      '<p class="questions-section-title">📋 Danh sách câu hỏi & đáp án</p>' +
      questionsHtml;
  }

  // --- 7. Render lỗi ---
  function renderError(msg) {
    var container = document.getElementById('view-content');
    if (!container) return;
    container.innerHTML =
      '<div class="state-box">' +
        '<div class="icon">❌</div>' +
        '<h3>' + esc(msg) + '</h3>' +
        '<p style="margin-bottom:1.5rem;">Không thể hiển thị bài trắc nghiệm này.</p>' +
        '<button class="btn btn-primary" onclick="window.location.href=\'quiz-list.html\'">' +
          '← Về danh sách' +
        '</button>' +
      '</div>';
  }

  // --- Global actions (gọi từ onclick trong HTML) ---
  var _currentQuizId = null;

  window.doTakeQuiz = function() {
    if (_currentQuizId) {
      window.location.href = 'takequiz/take_quiz.html?id=' + _currentQuizId;
    }
  };

  // renderExportButtons được gọi sau khi render() hoàn thành
  function _renderExport(quizId) {
    var container = document.getElementById('view-export-buttons');
    if (container && window.ExportManager) {
      ExportManager.renderExportButtons(container, quizId);
    }
  }

  // --- Main ---
  document.addEventListener('DOMContentLoaded', function() {
    var quizId = getQuizId();

    if (!quizId) {
      renderError('Không có ID bài trắc nghiệm trong URL');
      return;
    }

    var quiz = loadQuiz(quizId);

    if (!quiz) {
      renderError('Không tìm thấy bài trắc nghiệm với ID: ' + quizId);
      return;
    }

    _currentQuizId = quizId;
    render(quiz);
    // Render 4 nút xuất file sau khi DOM đã được build
    _renderExport(quizId);
  });

})();
</script>
</body>
</html>
